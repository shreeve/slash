name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs on the same branch when a new push lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build + run the full test suite (headless + PTY) on every supported OS.
  # `zigline` is pinned by URL + hash in `build.zig.zon`; the Zig package
  # manager fetches and caches it during `zig build`, so only the slash
  # repo needs to be checked out.
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # 10-minute ceiling per job. Local runs finish in ~1 min on
    # macOS and Linux; anything taking 10× that is wedged in a
    # PTY wait_for and we want the CI to fail loud rather than
    # silently consume runner minutes for an hour.
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out slash
        uses: actions/checkout@v5

      # Install Zig 0.16.0 directly from ziglang.org. The
      # `mlugg/setup-zig@v1` action's release index hadn't picked up
      # 0.16.0 at the time of writing (first run failed with HTTP
      # 404 fetching from the stale URL pattern). The manual install
      # is small and avoids future action-index drift, and is also
      # node-runtime-independent so we're insulated from the
      # actions/runner Node 20 → Node 24 transition (announced
      # 2025-09-19, enforced 2026-09-16).
      - name: Install Zig 0.16.0
        shell: bash
        run: |
          set -euo pipefail
          version=0.16.0
          uname_os=$(uname -s | tr '[:upper:]' '[:lower:]')
          uname_arch=$(uname -m)
          # ziglang.org uses zig-{arch}-{os}-{version}.tar.xz, where
          # `os` and `arch` follow Zig's own triple naming
          # (`aarch64-macos`, not `arm64-darwin`).
          case "$uname_os" in
            darwin) os=macos ;;
            linux)  os=linux ;;
            *)      echo "unsupported os: $uname_os" >&2; exit 1 ;;
          esac
          case "$uname_arch" in
            arm64|aarch64) arch=aarch64 ;;
            x86_64|amd64)  arch=x86_64 ;;
            *) echo "unsupported arch: $uname_arch" >&2; exit 1 ;;
          esac
          tarball="zig-${arch}-${os}-${version}.tar.xz"
          url="https://ziglang.org/download/${version}/${tarball}"
          echo "Fetching $url"
          mkdir -p "$HOME/.zig"
          curl --fail --location --silent --show-error "$url" -o /tmp/zig.tar.xz
          tar -xJf /tmp/zig.tar.xz -C "$HOME/.zig"
          dest="$HOME/.zig/zig-${arch}-${os}-${version}"
          echo "$dest" >> "$GITHUB_PATH"
          "$dest/zig" version

      - name: Build
        run: zig build

      - name: Headless tests
        run: zig build test-headless

      - name: PTY tests
        # The PTY suite spawns `bin/slash` against a real pseudo-terminal.
        # Linux runners under GitHub Actions support `/dev/ptmx` plus the
        # `TIOCSCTTY` / `TIOCSWINSZ` ioctls the harness uses. macOS runners
        # have the same primitives under different numeric constants;
        # the harness branches on `builtin.target.os.tag` to pick.
        run: zig build test-pty

      - name: Smoke test the binary
        run: ./bin/slash --version
