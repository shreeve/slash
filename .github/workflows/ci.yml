name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs on the same branch when a new push lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build + run the full test suite (headless + PTY) on every supported OS.
  # Slash uses the sibling-repo zigline path dependency, so this job checks
  # out both repos side by side and runs `zig build test` from inside slash.
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out slash
        uses: actions/checkout@v4
        with:
          path: slash

      # zigline is a sibling path dependency from `slash/build.zig.zon`
      # (`../zigline`). Check it out at the same workspace level so the
      # relative path resolves at build time. Pin to the tagged release
      # matching slash's current zigline target.
      - name: Check out zigline
        uses: actions/checkout@v4
        with:
          repository: shreeve/zigline
          ref: v0.5.0
          path: zigline

      # Install Zig 0.16.0 directly from ziglang.org. The
      # mlugg/setup-zig@v1 action's release index hadn't picked up
      # 0.16.0 at the time of writing (first run failed with HTTP
      # 404 fetching from the stale URL pattern). The manual install
      # is small and avoids future action-index drift.
      - name: Install Zig 0.16.0
        shell: bash
        run: |
          set -euo pipefail
          version=0.16.0
          os=$(uname -s | tr '[:upper:]' '[:lower:]')
          arch=$(uname -m)
          # ziglang.org uses zig-{arch}-{os}-{version}.tar.xz.
          tarball="zig-${arch}-${os}-${version}.tar.xz"
          url="https://ziglang.org/download/${version}/${tarball}"
          echo "Fetching $url"
          mkdir -p "$HOME/.zig"
          curl --fail --location --silent --show-error "$url" -o /tmp/zig.tar.xz
          tar -xJf /tmp/zig.tar.xz -C "$HOME/.zig"
          dest="$HOME/.zig/zig-${arch}-${os}-${version}"
          echo "$dest" >> "$GITHUB_PATH"
          "$dest/zig" version

      - name: Build
        working-directory: slash
        run: zig build

      - name: Headless tests
        working-directory: slash
        run: zig build test-headless

      - name: PTY tests
        working-directory: slash
        # The PTY suite spawns `bin/slash` against a real pseudo-terminal.
        # Linux runners under GitHub Actions support `/dev/ptmx` plus the
        # `TIOCSCTTY` / `TIOCSWINSZ` ioctls the harness uses. macOS runners
        # have the same primitives under different numeric constants;
        # the harness branches on `builtin.target.os.tag` to pick.
        run: zig build test-pty

      - name: Smoke test the binary
        working-directory: slash
        run: ./bin/slash --version
